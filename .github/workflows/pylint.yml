on: [push]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      
      - run: uv sync --locked --all-groups
      - run: uv run pylint ./src
        continue-on-error: false
